services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todoapp
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
